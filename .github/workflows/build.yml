name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3
    - name: Unzip project
      run: unzip TradingApp_Android.zip
    - name: Install Gradle
      run: |
        cd TradingApp
        curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip gradle.zip
        ./gradle-8.2/bin/gradle assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: TradingApp-APK
        path: TradingApp/app/build/outputs/apk/debug/*.apk
        retention-days: 90
