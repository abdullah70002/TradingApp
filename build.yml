name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # هذا يسمح لك بتشغيل البناء يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Unzip project
      run: unzip TradingApp_Android.zip

    - name: Find and Build
      run: |
        # البحث عن مجلد المشروع والتشغيل
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew not found!"
          exit 1
        fi
        cd $(dirname $GRADLEW_PATH)
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-debug
        path: "**/build/outputs/apk/debug/*.apk"
